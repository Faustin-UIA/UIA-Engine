name: UIA Bench (OpenAI)

on: workflow_dispatch

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci && npm i -E openai@^4

      - name: Run UIA Manifold
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          mkdir -p results
          node index.js \
            --provider=openai \
            --model=gpt-4o-2024-05-13 \
            --t=0.7 \
            --max_tokens=120 \
            --concurrency=3 \
            --log=results/uia_manifold_run.jsonl

      - name: Upload Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: uia-openai-results
          path: results/*